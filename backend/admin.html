<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d47a1;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#1565c0;
}
</style>

</head>
<body>

<div class="container">

<h2>Admin Panel</h2>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="price" placeholder="Price">

<input type="file" id="image" accept="image/*">

<input type="text" id="page" placeholder="Product Page">

<button id="saveBtn" onclick="addProduct()">
    Add Product
</button>
<hr>

<h2>All Products</h2>

<table border="1" width="100%" id="productTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>

    </tbody>

</table>
</div>
<h2>📦 Orders</h2>
<div id="ordersList"></div>
<table border="1" width="100%">
    <thead>
        <tr>
            <th>Order ID</th>
            <th>Name</th>
            <th>Total</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="ordersTable"></tbody>
</table>
<script src="admin.js"></script>
<form onsubmit="login(event)">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button type="submit">Login</button>
</form>

        window.location.href="admin-panel.html";

    }

</script>
</body>
</html>
