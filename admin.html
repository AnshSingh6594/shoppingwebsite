<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d47a1;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#1565c0;
}
</style>

</head>
<body>


<form onsubmit="login(event)">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button type="submit">Login</button>
</form>

<script>
function login(e){
    e.preventDefault();

    if(
        document.getElementById("username").value==="AnshSingh" &&
        document.getElementById("password").value==="Ansh@6594"
    ){
        localStorage.setItem("adminLoggedIn", "true");
window.location.href = "admin-panel.html";
    }else{
        alert("Wrong Username or Password");
    }
}
</script>
</body>
</html>
